<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Etsy Bağlanıyor...</title>
<style>
body{font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3;}
.box{text-align:center;background:#fff;border-radius:16px;padding:40px;box-shadow:0 4px 20px rgba(0,0,0,0.08);min-width:280px;}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid #e4e4e0;border-top-color:#e05c2a;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
p{color:#717170;font-size:13px;margin-top:8px;}
.err{color:#dc2626;font-size:12px;margin-top:8px;}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p id="msg">Etsy bağlantısı kuruluyor...</p>
  <p class="err" id="err"></p>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const state = params.get('state');
const error = params.get('error');

if (error) {
  document.getElementById('spinner') && (document.querySelector('.spinner').style.display='none');
  document.getElementById('msg').textContent = 'Bağlantı iptal edildi.';
  document.getElementById('err').textContent = error;
  setTimeout(() => window.location.href = 'dashboard.html', 2000);
} else if (code && state) {
  // sessionStorage'a kaydet ve dashboard'a yönlendir
  sessionStorage.setItem('etsy_code', code);
  sessionStorage.setItem('etsy_callback_state', state);
  document.getElementById('msg').textContent = 'Yönlendiriliyor...';
  window.location.href = 'dashboard.html?etsy_connected=1';
} else {
  document.getElementById('msg').textContent = 'Geçersiz callback.';
  document.getElementById('err').textContent = 'code veya state parametresi eksik.';
  setTimeout(() => window.location.href = 'dashboard.html', 3000);
}
</script>
</body>
</html>
