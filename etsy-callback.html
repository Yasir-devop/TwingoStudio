<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Etsy Bağlanıyor...</title>
<style>
body { font-family: Inter, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f3; }
.box { text-align: center; background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.spinner { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #e4e4e0; border-top-color: #e05c2a; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
p { color: #717170; font-size: 13px; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p id="msg">Etsy bağlantısı kuruluyor...</p>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const state = params.get('state');
const error = params.get('error');

if (error) {
  document.getElementById('msg').textContent = 'Bağlantı iptal edildi.';
  setTimeout(() => window.location.href = 'dashboard.html', 2000);
} else if (code) {
  // dashboard.html'e yönlendir ve code'u ilet
  sessionStorage.setItem('etsy_code', code);
  sessionStorage.setItem('etsy_callback_state', state);
  window.location.href = 'dashboard.html?etsy_connected=1';
}
</script>
</body>
</html>
