<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f3;
  --white: #ffffff;
  --gray-50: #fafaf9;
  --gray-100: #f0f0ee;
  --gray-200: #e4e4e0;
  --gray-300: #d0d0cc;
  --gray-400: #a8a8a4;
  --gray-500: #717170;
  --gray-700: #383836;
  --gray-900: #141413;
  --accent: #e05c2a;
  --accent-light: #fff3ee;
  --blue: #2563eb;
  --blue-light: #eff4ff;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --yellow: #ca8a04;
  --yellow-light: #fefce8;
  --red: #dc2626;
  --red-light: #fef2f2;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--gray-900);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

body.dark {
  --white: #1e1e1e; --gray-50: #252525; --gray-100: #2e2e2e;
  --gray-200: #3a3a3a; --gray-300: #4a4a4a; --gray-400: #767676;
  --gray-500: #9a9a9a; --gray-700: #d0d0d0; --gray-900: #f0f0f0;
  --bg: #141414; --accent-light: #2a1a10; --blue-light: #1e2d4a;
  --green-light: #0a2218; --yellow-light: #2a2008; --red-light: #2a0808;
  --purple-light: #1e1530;
}

/* ── HEADER ── */
header {
  height: 52px; background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0;
}
body.dark header { background: #111; border-color: #2a2a2a; }
.header-logo { font-size: 14px; font-weight: 600; color: var(--gray-900); }
.header-logo span { color: var(--accent); }
.header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.header-sep { width: 1px; height: 18px; background: var(--gray-200); }

/* ── LAYOUT ── */
.board {
  flex: 1; display: flex; gap: 0; overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--white); border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column; padding: 12px;
  gap: 4px; overflow-y: auto;
}
body.dark .sidebar { background: #1a1a1a; border-color: #2a2a2a; }
.sidebar-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--gray-400);
  padding: 8px 8px 6px;
}
.filter-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: var(--radius-md);
  border: none; background: transparent; cursor: pointer;
  font-family: inherit; font-size: 12px; color: var(--gray-700);
  text-align: left; width: 100%; transition: background 0.12s;
}
.filter-btn:hover { background: var(--gray-100); }
.filter-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.filter-count {
  margin-left: auto; font-size: 10px; font-weight: 700;
  background: var(--gray-200); color: var(--gray-500);
  border-radius: 10px; padding: 1px 7px; min-width: 20px; text-align: center;
}
.filter-btn.active .filter-count { background: var(--accent); color: #fff; }
.sidebar-sep { height: 1px; background: var(--gray-100); margin: 6px 0; }

/* ── MAIN CONTENT ── */
.content {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; border-bottom: 1px solid var(--gray-200);
  background: var(--white); flex-shrink: 0;
}
body.dark .toolbar { background: #1a1a1a; border-color: #2a2a2a; }
.search-wrap { position: relative; flex: 1; max-width: 320px; }
.search-wrap input {
  width: 100%; padding: 7px 10px 7px 32px;
  border: 1px solid var(--gray-200); border-radius: var(--radius-xl);
  background: var(--gray-50); font-family: inherit; font-size: 12px;
  color: var(--gray-900); outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); background: var(--white); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; }
.view-btns { display: flex; gap: 2px; margin-left: auto; }
.view-btn {
  padding: 6px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--gray-200); background: var(--white);
  cursor: pointer; font-size: 13px; transition: background 0.12s;
}
.view-btn.active { background: var(--gray-900); color: #fff; border-color: var(--gray-900); }
.btn-add {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius-xl);
  border: none; background: var(--gray-900); color: #fff;
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.12s;
}
.btn-add:hover { background: var(--gray-700); }

/* ── KANBAN ── */
.kanban { flex: 1; display: flex; gap: 12px; padding: 16px; overflow-x: auto; overflow-y: hidden; }
.kanban-col {
  flex: 1; min-width: 260px; max-width: 360px;
  background: var(--gray-100); border-radius: var(--radius-lg);
  display: flex; flex-direction: column; overflow: hidden;
}
.kanban-head {
  padding: 12px 14px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--gray-200);
}
.kanban-head-dot { width: 10px; height: 10px; border-radius: 50%; }
.kanban-head h3 { font-size: 12px; font-weight: 700; color: var(--gray-700); }
.kanban-head .col-count {
  margin-left: auto; font-size: 11px; font-weight: 600;
  background: var(--white); color: var(--gray-500);
  border-radius: 10px; padding: 1px 8px;
}
.kanban-cards { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

/* ── LIST VIEW ── */
.list-view { flex: 1; overflow-y: auto; padding: 16px; }
.list-section { margin-bottom: 20px; }
.list-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--gray-400);
  padding: 6px 0; margin-bottom: 8px;
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; gap: 8px;
}

/* ── TASK CARD ── */
.task-card {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--radius-md); padding: 12px;
  cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s;
  position: relative;
}
.task-card:hover { box-shadow: var(--shadow-md); border-color: var(--gray-300); }
.task-card.done-card { opacity: 0.6; }
.task-card .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.task-card .card-check {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--gray-300); flex-shrink: 0; margin-top: 1px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-size: 9px; color: transparent;
}
.task-card .card-check:hover { border-color: var(--green); }
.task-card.done-card .card-check { background: var(--green); border-color: var(--green); color: #fff; }
.task-card .card-title {
  font-size: 12px; font-weight: 600; color: var(--gray-900); flex: 1; line-height: 1.4;
}
.task-card.done-card .card-title { text-decoration: line-through; color: var(--gray-400); }
.task-card .card-note { font-size: 11px; color: var(--gray-500); line-height: 1.5; margin-bottom: 8px; }
.task-card .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.priority-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; flex-shrink: 0;
}
.p-high { background: var(--red-light); color: var(--red); }
.p-med  { background: var(--yellow-light); color: var(--yellow); }
.p-low  { background: var(--green-light); color: var(--green); }
.card-date { font-size: 10px; color: var(--gray-400); }
.card-delete {
  position: absolute; top: 8px; right: 8px;
  width: 20px; height: 20px; border-radius: 50%;
  background: transparent; border: none; cursor: pointer;
  font-size: 13px; color: var(--gray-300); display: none;
  align-items: center; justify-content: center;
  transition: color 0.12s, background 0.12s;
}
.task-card:hover .card-delete { display: flex; }
.card-delete:hover { color: var(--red); background: var(--red-light); }

/* List view row */
.list-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-md);
  background: var(--white); border: 1px solid var(--gray-200);
  margin-bottom: 6px; cursor: pointer; transition: box-shadow 0.12s;
  position: relative;
}
.list-row:hover { box-shadow: var(--shadow-sm); }
.list-row.done-card { opacity: 0.6; }
.list-row.done-card .card-title { text-decoration: line-through; color: var(--gray-400); }
.list-row .card-body { flex: 1; min-width: 0; }
.list-row .card-title { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.list-row .card-note { font-size: 11px; color: var(--gray-500); }
.list-row .card-delete { display: none; }
.list-row:hover .card-delete { display: flex; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.35); z-index: 500;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--white); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); padding: 24px;
  width: 540px; max-width: 92vw; max-height: 90vh; overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
  animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title { font-size: 16px; font-weight: 700; color: var(--gray-900); }
.modal-label { font-size: 11px; font-weight: 600; color: var(--gray-500); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.modal-inp {
  width: 100%; font-family: inherit; font-size: 13px;
  padding: 9px 11px; border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm); background: var(--gray-50);
  color: var(--gray-900); outline: none; transition: border-color 0.15s;
}
.modal-inp:focus { border-color: var(--accent); background: var(--white); }
.modal-inp::placeholder { color: var(--gray-400); }
textarea.modal-inp { resize: vertical; min-height: 180px; }
.radio-group { display: flex; gap: 8px; }
.radio-opt {
  flex: 1; padding: 8px; border-radius: var(--radius-md);
  border: 1.5px solid var(--gray-200); cursor: pointer;
  text-align: center; font-size: 11px; font-weight: 600;
  transition: all 0.12s; color: var(--gray-500);
}
.radio-opt:hover { border-color: var(--gray-400); }
.radio-opt.sel-todo  { border-color: var(--blue);   background: var(--blue-light);   color: var(--blue); }
.radio-opt.sel-doing { border-color: var(--yellow);  background: var(--yellow-light); color: var(--yellow); }
.radio-opt.sel-done  { border-color: var(--green);   background: var(--green-light);  color: var(--green); }
.radio-opt.sel-high  { border-color: var(--red);     background: var(--red-light);    color: var(--red); }
.radio-opt.sel-med   { border-color: var(--yellow);  background: var(--yellow-light); color: var(--yellow); }
.radio-opt.sel-low   { border-color: var(--green);   background: var(--green-light);  color: var(--green); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.btn { font-family: inherit; font-size: 12px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--gray-200); background: var(--white); color: var(--gray-700); cursor: pointer; transition: background 0.12s; }
.btn:hover { background: var(--gray-100); }
.btn-primary { background: var(--gray-900); color: #fff; border-color: var(--gray-900); }
.btn-primary:hover { background: var(--gray-700); }
.btn-danger { background: var(--red-light); color: var(--red); border-color: #fecaca; }
.btn-danger:hover { background: #fee2e2; }

/* ── MENTION & USERS ── */
.mention-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 800; font-style: italic; font-size: 0.95em; white-space: nowrap; }
.mention-item { padding: 8px 12px; cursor: pointer; font-size: 13px; color: var(--gray-900); display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
.mention-item:hover { background: var(--blue-light); color: var(--blue); }
.mention-item .m-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--gray-900); }
.user-del { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: color 0.12s; }
.user-del:hover { color: var(--red); background: var(--red-light); }

/* ── CONFIRM MODAL ── */
.confirm-box {
  background: var(--white); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); padding: 28px 24px 20px;
  width: 300px; display: flex; flex-direction: column;
  gap: 10px; align-items: center;
  animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.confirm-box .c-icon { font-size: 28px; }
.confirm-box .c-title { font-size: 14px; font-weight: 700; }
.confirm-box .c-msg { font-size: 12px; color: var(--gray-500); text-align: center; }
.confirm-btns { display: flex; gap: 8px; width: 100%; margin-top: 6px; }

/* ── SELECTION ── */
.task-card.selected, .list-row.selected { border-color: var(--blue) !important; background: var(--blue-light) !important; }
.sel-cb {
  width: 15px; height: 15px; border-radius: 3px;
  border: 1.5px solid var(--gray-300); background: var(--white);
  cursor: pointer; flex-shrink: 0; appearance: none; -webkit-appearance: none;
  transition: all 0.12s; margin-top: 1px;
}
.sel-cb:checked { background: var(--blue); border-color: var(--blue); }
.sel-cb:checked::after { content: '✓'; color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; line-height: 1; }
.sel-cb:hover { border-color: var(--blue); }
.export-btn {
  display: none; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius-xl);
  border: none; background: var(--blue); color: #fff;
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.12s;
}
.export-btn:hover { background: #1d4ed8; }
.export-btn.visible { display: flex; }

/* ── EMPTY ── */
.col-empty { text-align: center; padding: 24px 16px; color: var(--gray-400); font-size: 11px; }

/* ── STATS BAR ── */
.stats-bar {
  display: flex; gap: 16px; padding: 8px 20px;
  background: var(--white); border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0;
}
body.dark .stats-bar { background: #1a1a1a; border-color: #2a2a2a; }
.stat { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gray-500); }
.stat strong { font-weight: 700; color: var(--gray-900); font-size: 13px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }
</style>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCv_YX6Q5ZCO-KalyFZ4qh2RJMGxULrlas",
  authDomain: "twingostudio-cc351.firebaseapp.com",
  projectId: "twingostudio-cc351",
  storageBucket: "twingostudio-cc351.firebasestorage.app",
  messagingSenderId: "236093689838",
  appId: "1:236093689838:web:b502546fdf61b1cc6288ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
// doShare gibi module-dışı fonksiyonlar için window'a aç
window._db = db;
window._collection = collection;
window._getDocs = getDocs;
window._query = query;
window._where = where;
window._setDoc = setDoc;
window._doc = doc;

let currentUser = null;
let unsubscribeTasks = null;

// Auth kontrolü
onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  window._currentUser = user;
  document.body.style.visibility = 'visible';
  // Kullanıcı adını header'a yaz
  const nameEl = document.getElementById('user-display-name');
  if (nameEl) nameEl.textContent = user.displayName || user.email;
  // Görevleri yükle
  loadTasksFromFirebase();
});

// Firestore'dan görevleri gerçek zamanlı dinle
function loadTasksFromFirebase() {
  if (unsubscribeTasks) unsubscribeTasks();
  const q = query(collection(db, 'tasks'), where('userId', '==', currentUser.uid));
  unsubscribeTasks = onSnapshot(q, snapshot => {
    tasks = [];
    snapshot.forEach(d => tasks.push(d.data()));
    tasks.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    clearSkeletons();
    render();
  });
}

// Firestore'a kaydet
window._saveTask = async (task) => {
  if (!currentUser) return;
  task.userId = currentUser.uid;
  await setDoc(doc(db, 'tasks', task.id), task);
};

// Firestore'dan sil
window._deleteTask = async (taskId) => {
  if (!currentUser) return;
  await deleteDoc(doc(db, 'tasks', taskId));
};

window.fbSignOut = () => {
  import('https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js')
    .then(({getAuth, signOut}) => signOut(getAuth()).then(() => window.location.href = 'login.html'));
};
</script>
</head>
<body style="visibility:hidden;">

<header>
  <div class="header-logo">Team <span style="color:#e05c2a;">Board</span></div>
  <div class="header-sep"></div>
  <span style="font-size:11px;color:var(--gray-400);">Twingo Design · Ekip Paneli</span>
  <div class="header-actions">
    <button onclick="openUsersModal()" id="users-btn" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--gray-200);color:var(--gray-700);background:var(--gray-50);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;">
      👥 Kullanıcılar <span id="users-badge" style="background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;display:none;">0</span>
    </button>
    <span id="user-display-name" style="font-size:11px;color:var(--gray-400);"></span>
    <button onclick="window.fbSignOut()" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--gray-200);color:var(--gray-500);background:var(--gray-50);cursor:pointer;font-family:inherit;">Çıkış</button>
    <a href="index.html" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--gray-200);color:var(--gray-500);text-decoration:none;background:var(--gray-50);">← Ana Sayfa</a>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar" id="stats-bar"></div>

<div class="board">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Filtrele</div>
    <button class="filter-btn active" onclick="setFilter('all')" id="f-all">
      <span class="filter-dot" style="background:var(--gray-400);"></span>
      Tümü <span class="filter-count" id="fc-all">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('todo')" id="f-todo">
      <span class="filter-dot" style="background:var(--blue);"></span>
      Bekliyor <span class="filter-count" id="fc-todo">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('doing')" id="f-doing">
      <span class="filter-dot" style="background:var(--yellow);"></span>
      Devam Ediyor <span class="filter-count" id="fc-doing">0</span>

// ── STATE ─────────────────────────────────────────────────

function saveUsers() { localStorage.setItem('twingo_team_users', JSON.stringify(users)); }
function getUserColor(name) { let h=0; for(let c of name) h=c.charCodeAt(0)+((h<<5)-h); return USER_COLORS[Math.abs(h)%USER_COLORS.length]; }

function openUsersModal() { renderUsersList(); document.getElementById('users-modal').classList.add('show'); setTimeout(()=>document.getElementById('new-user-inp').focus(),100); }
function closeUsersModal() { document.getElementById('users-modal').classList.remove('show'); }

function addUser() {
  const name = document.getElementById('new-user-inp').value.trim();
  if (!name) return;
  if (users.find(u=>u.name.toLowerCase()===name.toLowerCase())) { showToast('Bu kullanıcı zaten var.'); return; }
  users.push({id:'u_'+Date.now(), name, color:getUserColor(name)});
  saveUsers(); renderUsersList(); updateUsersBadge();
  document.getElementById('new-user-inp').value='';
}

function deleteUser(id) { users=users.filter(u=>u.id!==id); saveUsers(); renderUsersList(); updateUsersBadge(); }

function renderUsersList() {
  const list = document.getElementById('users-list');
  if (!users.length) { list.innerHTML='<div style="text-align:center;padding:16px;color:var(--gray-400);font-size:12px;">Henüz kullanıcı eklenmedi</div>'; return; }

}

// @ Mention sistemi
let _mActive=false, _mStart=0, _mTarget=null;

function setupMentionInput(el) {
  el.addEventListener('input', e=>{
    const val=el.value, pos=el.selectionStart;
    const before=val.substring(0,pos);
    const atIdx=before.lastIndexOf('@');
    if(atIdx===-1){hideMD();return;}
    const q=before.substring(atIdx+1);
    if(q.includes(' ')||q.length>20){hideMD();return;}
    const f=users.filter(u=>u.name.toLowerCase().startsWith(q.toLowerCase()));
    if(!f.length){hideMD();return;}
    _mActive=true; _mStart=atIdx; _mTarget=el;
    showMD(f, el);
  });
  el.addEventListener('keydown', e=>{
    if(!_mActive) return;
    const dd=document.getElementById('mention-dropdown');
    const items=dd.querySelectorAll('.mention-item');
    const active=dd.querySelector('.mention-item.m-active');
    let idx=Array.from(items).indexOf(active);
    if(e.key==='ArrowDown'){e.preventDefault();idx=(idx+1)%items.length;items.forEach((it,i)=>it.classList.toggle('m-active',i===idx));}
    else if(e.key==='ArrowUp'){e.preventDefault();idx=(idx-1+items.length)%items.length;items.forEach((it,i)=>it.classList.toggle('m-active',i===idx));}
    else if(e.key==='Enter'&&active){e.preventDefault();active.click();}
    else if(e.key==='Escape'){hideMD();}
  });
  el.addEventListener('blur',()=>setTimeout(hideMD,150));
}

function showMD(list, el) {
  const dd=document.getElementById('mention-dropdown');
  dd.innerHTML=list.map((u,i)=>`<div class="mention-item${i===0?' m-active':''}" onmousedown="event.preventDefault();insertMention('${u.name}')"><div class="m-avatar" style="background:${u.color};">${u.name[0].toUpperCase()}</div>@${u.name}</div>`).join('');
  const rect=el.getBoundingClientRect();
  dd.style.left=rect.left+'px'; dd.style.top=(rect.bottom+4)+'px'; dd.style.display='block';
}
function hideMD() { _mActive=false; document.getElementById('mention-dropdown').style.display='none'; }
function insertMention(name) {
  if(!_mTarget) return;
  const el=_mTarget, val=el.value, pos=el.selectionStart;
  el.value=val.substring(0,_mStart)+'@'+name+' '+val.substring(pos);
  el.selectionStart=el.selectionEnd=_mStart+name.length+2;
  el.focus(); hideMD();
}

function getMentionsFromText(text) {
  if (!text) return [];
  const matches = [...text.matchAll(/@(\w+)/g)];
  const found = [];
  matches.forEach(m => {
    const u = users.find(u => u.name.toLowerCase() === m[1].toLowerCase());
    if (u && !found.find(f => f.id === u.id)) found.push(u);
  });
  return found;
}

function highlightMentions(text) {
  if(!text) return '';
  // Önce URL'leri linkle
  let result = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()" style="color:var(--blue);text-decoration:underline;word-break:break-all;">$1</a>');
  // Sonra @mention'ları renkle
  result = result.replace(/@(\w+)/g,(match,name)=>{
    const u=users.find(u=>u.name.toLowerCase()===name.toLowerCase());
    const color=u?u.color:'#2563eb';
    return `<span class="mention-tag" style="background:${color};color:#ffffff;">@${name}</span>`;
  });
  return result;
}

function openShareModal() {

async function doShare() {
  const email = document.getElementById('share-email-inp').value.trim().toLowerCase();
  const errEl = document.getElementById('share-error');
  const btn = document.getElementById('share-confirm-btn');
  errEl.style.display = 'none';

  if (!email) { errEl.textContent = 'E-posta gir.'; errEl.style.display = 'block'; return; }
  const currentUser = window._currentUser;
  if (!currentUser) { errEl.textContent = 'Oturum bulunamadı, sayfayı yenile.'; errEl.style.display = 'block'; return; }
  if (email === currentUser.email.toLowerCase()) {
    errEl.textContent = 'Kendinizle paylaşamazsınız.'; errEl.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = 'Aranıyor...';

  try {
    const { _db, _collection, _getDocs, _query, _where, _setDoc, _doc } = window;
    // users koleksiyonunda email ile ara
    const usersSnap = await _getDocs(_query(_collection(_db, 'users'), _where('email', '==', email)));
    if (usersSnap.empty) {
      errEl.textContent = 'Bu e-posta ile kayıtlı kullanıcı bulunamadı.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Paylaş';
      return;
    }

    const targetUser = usersSnap.docs[0].data();
    const selected = tasks.filter(t => selectedIds.has(t.id));

    // Görevleri hedef kullanıcıya kopyala
    const sharePromises = selected.map(t => {
      const newId = 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const sharedTask = {
        ...t,
        id: newId,
        userId: targetUser.uid,
        sharedBy: (window._currentUser?.email || ''),
        sharedAt: Date.now(),
        createdAt: Date.now()
      };
      return _setDoc(_doc(_db, 'tasks', newId), sharedTask);
    });

    await Promise.all(sharePromises);
    closeShareModal();
    showToast('✅ ' + selected.length + ' görev ' + email + ' ile paylaşıldı');
    // Seçimi temizle
    selectedIds.clear();
    updateExportBtn();
    render();
  } catch(e) {
    errEl.textContent = 'Hata: ' + e.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Paylaş';
  }
}

function exportSelected() {
  if (!selectedIds.size) return;
  const selected = tasks.filter(t => selectedIds.has(t.id));
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    count: selected.length,
    tasks: selected
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.download = 'twingo-tasks-' + new Date().toISOString().slice(0,10) + '.json';
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✅ ' + selected.length + ' görev dışa aktarıldı');
}

function importTasks(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.tasks || !Array.isArray(data.tasks)) throw new Error('Geçersiz format');
      const existing = new Set(tasks.map(t => t.id));
      let added = 0;
      const importPromises = [];
      data.tasks.forEach(t => {
        if (!existing.has(t.id)) {
          const newTask = { ...t, id: 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2) };
          tasks.push(newTask);
          importPromises.push(window._saveTask(newTask));
          added++;
        }
      });
      await Promise.all(importPromises);
      render();
      showToast('✅ ' + added + ' görev içe aktarıldı' + (data.tasks.length - added > 0 ? ', ' + (data.tasks.length - added) + ' zaten mevcut' : ''));
    } catch(err) {
      showToast('❌ Geçersiz dosya formatı');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── RENDER ────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search-inp').value.toLowerCase();
  return tasks.filter(t => {
    if (q && !t.title.toLowerCase().includes(q) && !(t.note||'').toLowerCase().includes(q)) return false;
    if (currentFilter === 'all') return true;
    if (currentFilter === 'task') return t.type === 'task';
    if (currentFilter === 'note') return t.type === 'note';
    if (['todo','doing','done'].includes(currentFilter)) return t.status === currentFilter;
    if (['high','med','low'].includes(currentFilter)) return t.priority === currentFilter;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  updateCounts();

  if (currentView === 'kanban') renderKanban(filtered);
  else renderList(filtered);
}

function updateCounts() {
  const counts = { all: tasks.length, todo: 0, doing: 0, done: 0, high: 0, med: 0, low: 0, task: 0, note: 0 };
  tasks.forEach(t => {
    counts[t.status]++;
    counts[t.priority]++;
    counts[t.type]++;
  });
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('fc-' + k);
    if (el) el.textContent = counts[k];
  });
  // Stats bar
  const done = tasks.filter(t => t.status === 'done').length;
  const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><strong>${tasks.length}</strong> toplam</div>
    <div class="stat"><strong style="color:var(--blue)">${counts.todo}</strong> bekliyor</div>
    <div class="stat"><strong style="color:var(--yellow)">${counts.doing}</strong> devam</div>
    <div class="stat"><strong style="color:var(--green)">${counts.done}</strong> tamam</div>
    <div class="stat" style="margin-left:auto;"><strong>${pct}%</strong> tamamlandı
      <div style="width:80px;height:4px;background:var(--gray-200);border-radius:2px;overflow:hidden;margin-left:6px;">
        <div style="width:${pct}%;height:100%;background:var(--green);border-radius:2px;transition:width 0.3s;"></div>
      </div>
    </div>`;
}

function renderKanban(filtered) {
  ['todo','doing','done'].forEach(status => {
    const col = document.getElementById('col-' + status);
    const items = filtered.filter(t => t.status === status);
    document.getElementById('kc-' + status).textContent = items.length;
    col.innerHTML = '';
    if (!items.length) { col.innerHTML = '<div class="col-empty">Yok</div>'; return; }
    items.forEach(t => col.appendChild(makeCard(t, false)));
  });
}

function renderList(filtered) {
  const lv = document.getElementById('list-view');
  lv.innerHTML = '';
  const groups = { todo: [], doing: [], done: [] };
  filtered.forEach(t => groups[t.status].push(t));
  const labels = { todo: '🔵 Bekliyor', doing: '🟡 Devam Ediyor', done: '🟢 Tamamlandı' };
  ['todo','doing','done'].forEach(s => {
    if (!groups[s].length) return;
    const sec = document.createElement('div'); sec.className = 'list-section';
    sec.innerHTML = `<div class="list-section-title">${labels[s]} <span style="font-weight:400;color:var(--gray-400);">${groups[s].length}</span></div>`;
    groups[s].forEach(t => sec.appendChild(makeCard(t, true)));
    lv.appendChild(sec);
  });
  if (!filtered.length) lv.innerHTML = '<div style="text-align:center;padding:48px;color:var(--gray-400);">Sonuç yok</div>';
}

function makeCard(t, isList) {
  const el = document.createElement('div');
  el.className = (isList ? 'list-row' : 'task-card') + (t.status === 'done' ? ' done-card' : '') + (selectedIds.has(t.id) ? ' selected' : '');

  const pBadge = `<span class="priority-badge p-${t.priority}">${t.priority==='high'?'Yüksek':t.priority==='med'?'Orta':'Düşük'}</span>`;
  const typeBadge = t.type === 'note' ? '<span style="font-size:10px;color:var(--gray-400);">📝 Not</span>' : '';
  const date = new Date(t.createdAt).toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
  const titleHl = highlightMentions(t.title);
  const noteHl = t.note ? highlightMentions(t.note) : '';

  if (isList) {
    el.innerHTML = `
      <div class="card-check" onclick="event.stopPropagation();toggleDone('${t.id}')">${t.status==='done'?'✓':''}</div>
      <input type="checkbox" class="sel-cb" ${selectedIds.has(t.id)?'checked':''} onclick="event.stopPropagation();toggleSelectById('${t.id}')">
      <div class="card-body">
        <div class="card-title">${titleHl}</div>
        ${noteHl ? `<div class="card-note">${noteHl.substring(0,120)}${noteHl.length>120?'…':''}</div>` : ''}
        <div class="card-meta" style="margin-top:4px;">${pBadge}${getMentionsFromText(t.title + ' ' + (t.note||'')).map(u=>`<span class="mention-tag" style="background:${u.color};color:#fff;font-size:10px;padding:1px 6px;">@${u.name}</span>`).join('')}${typeBadge}<span class="card-date">${date}</span></div>
      </div>
      <button class="card-delete" onclick="event.stopPropagation();confirmDelete('${t.id}','${t.title.replace(/'/g,"\\'")}')">×</button>`;
  } else {
    el.innerHTML = `
      <div class="card-top">
        <div class="card-check" onclick="event.stopPropagation();toggleDone('${t.id}')">${t.status==='done'?'✓':''}</div>
        <input type="checkbox" class="sel-cb" ${selectedIds.has(t.id)?'checked':''} onclick="event.stopPropagation();toggleSelectById('${t.id}')">
        <div class="card-title">${t.title}</div>
        <button class="card-delete" onclick="event.stopPropagation();confirmDelete('${t.id}','${t.title.replace(/'/g,"\\'")}')">×</button>
      </div>
      ${t.note ? `<div class="card-note">${t.note.substring(0,100)}${t.note.length>100?'…':''}</div>` : ''}
      <div class="card-meta">${pBadge}${getMentionsFromText(t.title + ' ' + (t.note||'')).map(u=>`<span class="mention-tag" style="background:${u.color};color:#fff;font-size:10px;padding:1px 6px;">@${u.name}</span>`).join('')}${typeBadge}<span class="card-date">${date}</span></div>`;
  }

  el.addEventListener('click', e => {
    if (e.target.tagName === 'A') return; // link tıklandıysa modal açma
    openModal(t.id);
  });
  return el;
}

// ── TASK ACTIONS ──────────────────────────────────────────
async function toggleDone(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.status = t.status === 'done' ? 'todo' : 'done';
  await window._saveTask(t); render();
}

async function deleteTask() {
  if (!editingId) return;
  const id = editingId;
  const title = tasks.find(t => t.id === id)?.title || '';
  closeModal();
  const ok = await showConfirm(`"${title}" silinecek.`);
  if (ok) {
    tasks = tasks.filter(t => t.id !== id);
    await window._deleteTask(id); render();
  }
}

async function confirmDelete(id, title) {
  const ok = await showConfirm(`"${title}" silinecek.`);
  if (ok) {
    tasks = tasks.filter(t => t.id !== id);
    await window._deleteTask(id); render();
  }
}

// ── MODAL ─────────────────────────────────────────────────
function updateNotePreview() {
  const val = document.getElementById('m-note').value;
  const preview = document.getElementById('note-preview');
  if (!val.trim()) { preview.style.display='none'; return; }
  const html = highlightMentions(val);
  const hasSpecial = /@\w+/.test(val) || /https?:\/\//.test(val);
  if (hasSpecial) {
    document.getElementById('note-preview-content').innerHTML = html;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

function openModal(id) {
  editingId = id || null;
  const t = id ? tasks.find(x => x.id === id) : null;

  document.getElementById('modal-title').textContent = t ? 'Düzenle' : 'Yeni Ekle';
  document.getElementById('delete-btn').style.display = t ? 'block' : 'none';
  document.getElementById('m-title').value = t ? t.title : '';
  document.getElementById('m-note').value = t ? (t.note || '') : '';

  selectType(t ? t.type : 'task');
  selectStatus(t ? t.status : 'todo');
  selectPriority(t ? t.priority : 'high');

  document.getElementById('task-modal').classList.add('show');
  // Mention setup
  setupMentionInput(document.getElementById('m-title'));
  setupMentionInput(document.getElementById('m-note'));
  setTimeout(() => {
    document.getElementById('m-title').focus();
    updateNotePreview();
  }, 100);
}
function closeModal() { document.getElementById('task-modal').classList.remove('show'); editingId = null; }

function selectType(v) {
  mType = v;
  document.getElementById('type-task').className = 'radio-opt' + (v==='task'?' sel-todo':'');
  document.getElementById('type-note').className = 'radio-opt' + (v==='note'?' sel-todo':'');
  document.getElementById('status-row').style.display = v === 'note' ? 'none' : 'block';
}
function selectStatus(v) {
  mStatus = v;
  ['todo','doing','done'].forEach(s => {
    document.getElementById('s-'+s).className = 'radio-opt' + (s===v?' sel-'+s:'');
  });
}
function selectPriority(v) {
  mPriority = v;
  ['high','med','low'].forEach(p => {
    document.getElementById('p-'+p).className = 'radio-opt' + (p===v?' sel-'+p:'');
  });
}

async function saveTask() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) { document.getElementById('m-title').style.borderColor='var(--red)'; return; }
  document.getElementById('m-title').style.borderColor='';

  let taskObj;
  if (editingId) {
    taskObj = tasks.find(x => x.id === editingId);
    if (taskObj) { taskObj.title = title; taskObj.note = document.getElementById('m-note').value.trim(); taskObj.type = mType; taskObj.status = mType==='note'?'todo':mStatus; taskObj.priority = mPriority; taskObj.updatedAt = Date.now(); }
  } else {
    taskObj = { id: 'task_'+Date.now(), title, note: document.getElementById('m-note').value.trim(), type: mType, status: mType==='note'?'todo':mStatus, priority: mPriority, createdAt: Date.now(), updatedAt: Date.now() };
    tasks.unshift(taskObj);
  }
  if (taskObj) await window._saveTask(taskObj);
  render(); closeModal();
}

// ── CONFIRM ───────────────────────────────────────────────
function showConfirm(msg) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-modal').classList.add('show');
  return new Promise(res => {
    _confirmResolve = res;
    document.getElementById('confirm-ok').onclick = () => {
      document.getElementById('confirm-modal').classList.remove('show');
      _confirmResolve = null;
      res(true);
    };
    document.getElementById('confirm-cancel-btn').onclick = () => {
      document.getElementById('confirm-modal').classList.remove('show');
      _confirmResolve = null;
      res(false);
    };
  });
}
function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('show');
  if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
}
</script>
