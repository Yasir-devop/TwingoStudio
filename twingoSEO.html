<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Studio — Twingo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3; --white: #fff;
  --gray-50: #fafaf9; --gray-100: #f0f0ee; --gray-200: #e4e4e0;
  --gray-400: #a8a8a4; --gray-500: #717170; --gray-700: #383836; --gray-900: #141413;
  --accent: #e05c2a; --accent-light: #fff3ee;
  --green: #16a34a; --green-light: #f0fdf4;
  --radius-md: 10px; --radius-lg: 16px; --radius-xl: 22px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--gray-900); min-height: 100vh; display: flex; flex-direction: column; }

header { height: 52px; background: var(--white); border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.logo { font-size: 14px; font-weight: 700; }
.logo span { color: var(--accent); }
.sep { width: 1px; height: 18px; background: var(--gray-200); }
.sub { font-size: 11px; color: var(--gray-400); }
.back-btn { margin-left: auto; font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--gray-200); color: var(--gray-500); background: var(--gray-50); cursor: pointer; text-decoration: none; font-family: inherit; }

.page { max-width: 860px; margin: 0 auto; padding: 28px 24px; width: 100%; display: flex; flex-direction: column; gap: 20px; }

/* INPUT CARD */
.card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); }
.card-title { font-size: 13px; font-weight: 700; color: var(--gray-900); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.inp-wrap { display: flex; gap: 10px; }
.inp { flex: 1; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); font-family: inherit; font-size: 13px; color: var(--gray-900); background: var(--gray-50); outline: none; transition: border-color 0.15s; }
.inp:focus { border-color: var(--accent); background: var(--white); }
.inp::placeholder { color: var(--gray-400); }
.analyse-btn { padding: 10px 20px; border-radius: var(--radius-md); border: none; background: linear-gradient(135deg, #e05c2a, #c94d1e); color: #fff; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 8px rgba(224,92,42,0.3); transition: transform 0.15s; }
.analyse-btn:hover:not(:disabled) { transform: translateY(-1px); }
.analyse-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.hint { font-size: 11px; color: var(--gray-400); margin-top: 8px; }

/* LOADING */
.loading-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 48px; text-align: center; box-shadow: var(--shadow-sm); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; max-width: 280px; margin-left: auto; margin-right: auto; }
.step-row { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--gray-400); }
.step-row.active { color: var(--accent); font-weight: 600; }
.step-row.done { color: var(--green); }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-200); flex-shrink: 0; }
.step-row.active .step-dot { background: var(--accent); }
.step-row.done .step-dot { background: var(--green); }

/* SOURCE CARD */
.source-card { background: var(--accent-light); border: 1px solid #fcd9c7; border-radius: var(--radius-lg); padding: 16px 20px; display: flex; gap: 14px; align-items: flex-start; }
.source-icon { font-size: 20px; flex-shrink: 0; }
.source-title { font-size: 12px; font-weight: 700; color: var(--gray-700); margin-bottom: 4px; }
.source-text { font-size: 12px; color: var(--gray-500); line-height: 1.6; }
.source-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.source-tag { font-size: 10px; font-weight: 500; background: rgba(224,92,42,0.12); color: var(--accent); border-radius: 20px; padding: 2px 8px; }

/* SET CARDS */
.sets-grid { display: flex; flex-direction: column; gap: 16px; }
.set-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow 0.15s; }
.set-card:hover { box-shadow: var(--shadow-md); }
.set-header { padding: 14px 18px; background: var(--gray-50); border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
.set-num { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
.set-num.original { color: var(--green); }
.set-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

/* TITLE ROW */
.field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray-400); margin-bottom: 6px; display: flex; justify-content: space-between; }
.title-box { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: 12px 14px; font-size: 13px; color: var(--gray-900); line-height: 1.5; position: relative; }
.char-count { font-size: 10px; color: var(--gray-400); }
.char-count.warn { color: #d97706; }
.char-count.good { color: var(--green); }

/* TAGS */
.tags-box { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--gray-100); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--gray-700); border: 1px solid var(--gray-200); }

/* COPY BUTTONS */
.copy-row { display: flex; gap: 8px; flex-wrap: wrap; }
.copy-btn { font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--gray-200); background: var(--white); color: var(--gray-700); cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 5px; }
.copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.copy-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-light); }
.copy-all-btn { font-size: 11px; font-weight: 700; padding: 6px 16px; border-radius: 20px; border: none; background: var(--gray-900); color: #fff; cursor: pointer; font-family: inherit; margin-left: auto; }
.copy-all-btn:hover { background: var(--accent); }

/* TOAST */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: #fff; font-size: 12px; font-weight: 500; padding: 8px 18px; border-radius: 20px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body style="visibility:hidden;">

<header>
  <div class="logo">Twingo <span>SEO</span></div>
  <div class="sep"></div>
  <div class="sub">Etsy Title & Tag Üretici</div>
  <a href="index.html" class="back-btn">← Ana Sayfa</a>
</header>

<div class="page">

  <!-- GİRİŞ -->
  <div class="card">
    <div class="card-title">🔗 Etsy Listing Linki</div>
    <div class="inp-wrap">
      <input class="inp" type="url" id="etsy-url"
        placeholder="https://www.etsy.com/listing/..."
        onkeydown="if(event.key==='Enter')generate()">
      <button class="analyse-btn" id="gen-btn" onclick="generate()">✨ Üret</button>
    </div>
    <div class="hint">Etsy listing URL'sini yapıştır → n8n otomasyonu title & tag okur → ChatGPT ile 4 SEO seti oluşturulur.</div>
  </div>

  <!-- LOADING -->
  <div class="loading-card" id="loading-card" style="display:none;">
    <div class="spinner"></div>
    <div style="font-size:14px;font-weight:600;color:var(--gray-700);">Analiz ediliyor...</div>
    <div class="loading-steps" id="loading-steps">
      <div class="step-row" id="step-1"><div class="step-dot"></div>Veriler alındı</div>
      <div class="step-row" id="step-2"><div class="step-dot"></div>Mevcut title & tag analiz ediliyor</div>
      <div class="step-row" id="step-3"><div class="step-dot"></div>ChatGPT ile 3 yeni set üretiliyor</div>
      <div class="step-row" id="step-4"><div class="step-dot"></div>Sonuçlar hazırlanıyor</div>
    </div>
  </div>

  <!-- SONUÇLAR -->
  <div id="results-wrap" style="display:none; flex-direction:column; gap:16px;"></div>

</div>

<div id="toast"></div>

<!-- Firebase Auth -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
const app = initializeApp({
  apiKey: "AIzaSyCv_YX6Q5ZCO-KalyFZ4qh2RJMGxULrlas",
  authDomain: "twingostudio-cc351.firebaseapp.com",
  projectId: "twingostudio-cc351",
  storageBucket: "twingostudio-cc351.firebasestorage.app",
  messagingSenderId: "236093689838",
  appId: "1:236093689838:web:b502546fdf61b1cc6288ff"
});
const auth = getAuth(app);
onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'login.html'; return; }
  document.body.style.visibility = 'visible';
});
</script>

<script>
const FUNCTION_URL = 'https://twingostudio.netlify.app/.netlify/functions/etsy-auth';
// n8n webhook URL'ini buraya yaz (n8n'den kopyala)
const N8N_WEBHOOK_URL = 'https://twingo-studio.app.n8n.cloud/webhook/twingo-seo';

window.updateCharCount = (inp) => {
  const len = inp.value.length;
  const badge = document.getElementById('title-len-badge');
  if (badge) {
    badge.textContent = len + '/140';
    badge.style.color = len > 130 ? '#d97706' : len > 100 ? '#16a34a' : '#a8a8a4';
  }
};

window.updateCharCount = () => {
  const len = document.getElementById('current-title').value.length;
  const el = document.getElementById('title-len');
  if (el) { el.textContent = len; el.style.color = len > 130 ? '#d97706' : len > 100 ? '#16a34a' : ''; }
};

function setStep(n) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('step-' + i);
    if (i < n) { el.className = 'step-row done'; }
    else if (i === n) { el.className = 'step-row active'; }
    else { el.className = 'step-row'; }
  }
}

window.generate = async () => {
  const url = document.getElementById('etsy-url').value.trim();
  if (!url || !url.includes('etsy.com')) {
    showToast('❌ Geçerli bir Etsy listing URL gir');
    return;
  }

  if (N8N_WEBHOOK_URL === 'N8N_WEBHOOK_URL_BURAYA') {
    showToast('❌ n8n webhook URL ayarlanmamış');
    return;
  }

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading-card').style.display = 'block';
  document.getElementById('results-wrap').style.display = 'none';

  try {
    // Adım 1: n8n webhook'a gönder
    setStep(1);
    const res = await fetch(N8N_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });

    if (!res.ok) throw new Error('n8n webhook hatası: ' + res.status);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'n8n işlem hatası');

    setStep(2);
    await new Promise(r => setTimeout(r, 200));
    setStep(3);
    await new Promise(r => setTimeout(r, 200));

    // Adım 4: Render
    setStep(4);
    renderResults(data.original, data.sets);

  } catch(e) {
    showToast('❌ ' + e.message);
    console.error(e);
  }

  document.getElementById('gen-btn').disabled = false;
  document.getElementById('loading-card').style.display = 'none';
};

function renderResults(original, sets) {
  const wrap = document.getElementById('results-wrap');
  wrap.style.display = 'flex';

  const allSets = [
    { title: original.originalTitle, tags: original.originalTags, focus: 'Mevcut listing\'den alındı', isOriginal: true },
    ...sets
  ];

  wrap.innerHTML = allSets.map((set, i) => {
    const titleLen = set.title.length;
    const lenClass = titleLen > 130 ? 'warn' : titleLen > 100 ? 'good' : '';
    const tagsHtml = set.tags.map(t =>
      `<div class="tag-chip">${t}</div>`
    ).join('');

    return `
    <div class="set-card">
      <div class="set-header">
        <div class="set-num ${set.isOriginal ? 'original' : ''}">
          ${set.isOriginal ? '✦ Orijinal Set' : `Set ${i} — AI Üretim`}
        </div>
        <div style="font-size:11px;color:var(--gray-500);">${set.focus}</div>
      </div>
      <div class="set-body">
        <div>
          <div class="field-label">
            Title
            <span class="char-count ${lenClass}">${titleLen}/140 karakter</span>
          </div>
          <div class="title-box">${set.title}</div>
        </div>
        <div>
          <div class="field-label">
            Tags
            <span class="char-count ${set.tags.length === 13 ? 'good' : ''}">${set.tags.length}/13 tag</span>
          </div>
          <div class="tags-box">${tagsHtml}</div>
        </div>
        <div class="copy-row">
          <button class="copy-btn" onclick="copyText('${escStr(set.title)}', this)">📋 Title Kopyala</button>
          <button class="copy-btn" onclick="copyText('${escStr(set.tags.join(', '))}', this)">📋 Tags Kopyala</button>
          <button class="copy-all-btn" onclick="copyAll('${escStr(set.title)}', '${escStr(set.tags.join(', '))}', this)">📋 Tümünü Kopyala</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function escStr(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

window.copyText = async (text, btn) => {
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    btn.textContent = '✅ Kopyalandı';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = btn.textContent.includes('Title') ? '📋 Title Kopyala' : '📋 Tags Kopyala'; }, 2000);
    showToast('✅ Kopyalandı');
  } catch(e) { showToast('❌ Kopyalanamadı'); }
};

window.copyAll = async (title, tags, btn) => {
  const text = `TITLE:\n${title}\n\nTAGS:\n${tags}`;
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✅ Kopyalandı';
    setTimeout(() => btn.textContent = '📋 Tümünü Kopyala', 2000);
    showToast('✅ Tümü kopyalandı');
  } catch(e) { showToast('❌ Kopyalanamadı'); }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 3000);
}
</script>
</body>
</html>
