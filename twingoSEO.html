<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Studio — Twingo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3; --white: #fff;
  --gray-50: #fafaf9; --gray-100: #f0f0ee; --gray-200: #e4e4e0;
  --gray-400: #a8a8a4; --gray-500: #717170; --gray-700: #383836; --gray-900: #141413;
  --accent: #e05c2a; --accent-light: #fff3ee;
  --green: #16a34a; --green-light: #f0fdf4;
  --radius-md: 10px; --radius-lg: 16px; --radius-xl: 22px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--gray-900); min-height: 100vh; display: flex; flex-direction: column; }

header { height: 52px; background: var(--white); border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.logo { font-size: 14px; font-weight: 700; }
.logo span { color: var(--accent); }
.sep { width: 1px; height: 18px; background: var(--gray-200); }
.sub { font-size: 11px; color: var(--gray-400); }
.back-btn { margin-left: auto; font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--gray-200); color: var(--gray-500); background: var(--gray-50); cursor: pointer; text-decoration: none; font-family: inherit; }

.page { max-width: 860px; margin: 0 auto; padding: 28px 24px; width: 100%; display: flex; flex-direction: column; gap: 20px; }

.card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); }
.card-title { font-size: 13px; font-weight: 700; color: var(--gray-900); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.06em; display: flex; justify-content: space-between; align-items: center; }
.label-count { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--gray-400); font-size: 10px; }
.inp { width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); font-family: inherit; font-size: 13px; color: var(--gray-900); background: var(--gray-50); outline: none; transition: border-color 0.15s; resize: none; }
.inp:focus { border-color: var(--accent); background: var(--white); }
.inp::placeholder { color: var(--gray-400); }
.hint { font-size: 11px; color: var(--gray-400); margin-top: 5px; }

.gen-btn { width: 100%; padding: 13px; border-radius: var(--radius-xl); border: none; background: linear-gradient(135deg, #e05c2a, #c94d1e); color: #fff; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(224,92,42,0.3); transition: transform 0.15s, box-shadow 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.gen-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(224,92,42,0.4); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.loading-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 48px; text-align: center; box-shadow: var(--shadow-sm); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SET CARDS */
.set-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
.set-header { padding: 12px 18px; background: var(--gray-50); border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
.set-num { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
.set-num.original { color: var(--green); }
.set-focus { font-size: 11px; color: var(--gray-500); }
.set-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

.field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray-400); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.title-box { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; color: var(--gray-700); line-height: 1.5; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip { background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 20px; padding: 3px 12px; font-size: 12px; color: var(--gray-700); }

.copy-row { display: flex; gap: 8px; flex-wrap: wrap; }
.copy-btn { font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--gray-200); background: var(--white); color: var(--gray-700); cursor: pointer; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
.copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.copy-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-light); }
.copy-all-btn { margin-left: auto; font-size: 11px; font-weight: 700; padding: 6px 16px; border-radius: 20px; border: none; background: var(--gray-900); color: #fff; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.copy-all-btn:hover { background: var(--accent); }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: #fff; font-size: 12px; font-weight: 500; padding: 8px 18px; border-radius: 20px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body style="visibility:hidden;">

<header>
  <div class="logo">Twingo <span>SEO</span></div>
  <div class="sep"></div>
  <div class="sub">Title & Tag Üretici</div>
  <a href="index.html" class="back-btn">← Ana Sayfa</a>
</header>

<div class="page">

  <div class="card">
    <div class="card-title">📋 Mevcut Listing Bilgileri</div>

    <div class="field">
      <div class="label">
        Mevcut Title
        <span class="label-count"><span id="title-len">0</span>/140</span>
      </div>
      <input class="inp" type="text" id="inp-title" maxlength="140"
        placeholder="Etsy listing title'ını buraya yapıştır..."
        oninput="document.getElementById('title-len').textContent=this.value.length">
    </div>

    <div class="field">
      <div class="label">Mevcut Tags</div>
      <input class="inp" type="text" id="inp-tags"
        placeholder="custom shirt, birthday gift, personalized tee, funny shirt...">
      <div class="hint">💡 Virgülle ayır — Etsy'den kopyalayıp yapıştır</div>
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generate()">✨ 4 SEO Seti Üret</button>
  </div>

  <div class="loading-card" id="loading-card" style="display:none;">
    <div class="spinner"></div>
    <div style="font-size:14px;font-weight:600;color:var(--gray-700);">ChatGPT analiz ediyor...</div>
    <div style="font-size:12px;color:var(--gray-400);margin-top:6px;">3 farklı SEO seti oluşturuluyor</div>
  </div>

  <div id="results-wrap" style="display:flex;flex-direction:column;gap:16px;"></div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
const app = initializeApp({
  apiKey: "AIzaSyCv_YX6Q5ZCO-KalyFZ4qh2RJMGxULrlas",
  authDomain: "twingostudio-cc351.firebaseapp.com",
  projectId: "twingostudio-cc351",
  storageBucket: "twingostudio-cc351.firebasestorage.app",
  messagingSenderId: "236093689838",
  appId: "1:236093689838:web:b502546fdf61b1cc6288ff"
});
const auth = getAuth(app);
onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'login.html'; return; }
  document.body.style.visibility = 'visible';
});
</script>

<script>
const FUNCTION_URL = 'https://twingostudio.netlify.app/.netlify/functions/etsy-auth';

window.generate = async () => {
  const title = document.getElementById('inp-title').value.trim();
  const tagsRaw = document.getElementById('inp-tags').value.trim();

  if (!title) { showToast('❌ Title gir'); return; }

  const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading-card').style.display = 'block';
  document.getElementById('results-wrap').innerHTML = '';

  const prompt = `Sen bir Etsy SEO uzmanısın. Aşağıdaki Etsy listing bilgilerini analiz edip 3 farklı SEO optimizasyonlu title ve tag seti oluştur.

Mevcut Title: "${title}"
Mevcut Tags: ${tags.length ? tags.join(', ') : '(belirtilmedi)'}

Kurallar:
- Her title max 140 karakter olmalı
- Her set tam olarak 13 tag içermeli
- Her tag max 20 karakter olmalı
- Taglar Etsy alıcılarının gerçekten aradığı kelimeler olmalı
- Set 1: Genel SEO — geniş kitle
- Set 2: Hediye/gift odaklı arama terimleri
- Set 3: Niş, uzun kuyruklu spesifik kelimeler
- Sadece İngilizce

Yanıtını SADECE bu JSON formatında ver, başka hiçbir şey yazma:
{
  "sets": [
    {"title":"...","tags":["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8","tag9","tag10","tag11","tag12","tag13"],"focus":"Setin odak noktası (Türkçe)"},
    {"title":"...","tags":[...],"focus":"..."},
    {"title":"...","tags":[...],"focus":"..."}
  ]
}`;

  try {
    const res = await fetch(FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'chatgpt', prompt })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const clean = data.content.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderResults({ title, tags }, parsed.sets);
  } catch(e) {
    showToast('❌ ' + e.message);
    console.error(e);
  }

  document.getElementById('gen-btn').disabled = false;
  document.getElementById('loading-card').style.display = 'none';
};

function renderResults(original, sets) {
  const wrap = document.getElementById('results-wrap');
  const allSets = [
    { title: original.title, tags: original.tags, focus: 'Etsy\'den alınan orijinal bilgiler', isOriginal: true },
    ...sets
  ];

  wrap.innerHTML = allSets.map((set, i) => {
    const len = set.title.length;
    const lenColor = len > 130 ? '#d97706' : len > 100 ? '#16a34a' : '#a8a8a4';
    return `
    <div class="set-card">
      <div class="set-header">
        <div class="set-num ${set.isOriginal ? 'original' : ''}">
          ${set.isOriginal ? '✦ Orijinal' : 'Set ' + i}
        </div>
        <div class="set-focus">${set.focus}</div>
      </div>
      <div class="set-body">
        <div>
          <div class="field-label">
            Title
            <span style="color:${lenColor}">${len}/140</span>
          </div>
          <div class="title-box">${set.title}</div>
        </div>
        <div>
          <div class="field-label">
            Tags
            <span style="color:${set.tags.length===13?'#16a34a':'#a8a8a4'}">${set.tags.length}/13</span>
          </div>
          <div class="tags-wrap">${set.tags.map(t => `<div class="tag-chip">${t}</div>`).join('')}</div>
        </div>
        <div class="copy-row">
          <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(set.title)})">📋 Title</button>
          <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(set.tags.join(', '))})">📋 Tags</button>
          <button class="copy-all-btn" onclick="copyAll(this, ${JSON.stringify(set.title)}, ${JSON.stringify(set.tags.join(', '))})">📋 Tümünü Kopyala</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.copyText = async (btn, text) => {
  await navigator.clipboard.writeText(text);
  const orig = btn.innerHTML;
  btn.classList.add('copied');
  btn.textContent = '✅ Kopyalandı';
  setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 2000);
  showToast('✅ Kopyalandı');
};

window.copyAll = async (btn, title, tags) => {
  await navigator.clipboard.writeText(`TITLE:\n${title}\n\nTAGS:\n${tags}`);
  const orig = btn.textContent;
  btn.textContent = '✅ Kopyalandı';
  setTimeout(() => btn.textContent = orig, 2000);
  showToast('✅ Tümü kopyalandı');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 3000);
}
</script>
</body>
</html>
